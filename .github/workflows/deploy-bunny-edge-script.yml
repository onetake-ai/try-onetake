# Deploys the OTO personalisation proxy to BunnyCDN Edge Scripts.
#
# Triggers only when edge-scripts/oto-personalize.js is changed on main,
# so unrelated pushes (page copy, CSS, etc.) never trigger a deploy.
#
# Required GitHub repository secrets:
#   BUNNY_API_KEY   — found in BunnyCDN Dashboard → Account → API
#   BUNNY_SCRIPT_ID — the numeric ID of your Edge Script (shown in the URL
#                     when you open the script in the BunnyCDN dashboard,
#                     e.g. https://dash.bunny.net/edge-script/12345)

name: Deploy OTO Edge Script to BunnyCDN

on:
  push:
    branches:
      - main
    paths:
      - 'edge-scripts/oto-personalize.js'

jobs:
  deploy:
    name: Deploy to BunnyCDN
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload edge script code to BunnyCDN
        env:
          BUNNY_API_KEY: ${{ secrets.BUNNY_API_KEY }}
          BUNNY_SCRIPT_ID: ${{ secrets.BUNNY_SCRIPT_ID }}
        run: |
          HTTP_STATUS=$(curl -s -o /tmp/bunny_response.txt -w "%{http_code}" \
            -X POST \
            "https://api.bunny.net/edgescript/${BUNNY_SCRIPT_ID}/code" \
            -H "AccessKey: ${BUNNY_API_KEY}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @edge-scripts/oto-personalize.js)

          echo "BunnyCDN response (HTTP ${HTTP_STATUS}):"
          cat /tmp/bunny_response.txt

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -gt 299 ]; then
            echo "Deploy failed with status ${HTTP_STATUS}"
            exit 1
          fi

          echo "Deploy successful."
